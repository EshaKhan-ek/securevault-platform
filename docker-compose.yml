version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: securevault-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: docker/auth/Dockerfile
    container_name: securevault-auth
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/auth.db
      - FRONTEND_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - auth_db:/app/data
      - ./src/auth_service/private.pem:/app/private.pem:ro
      - ./src/auth_service/public.pem:/app/public.pem:ro
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: docker/user/Dockerfile
    container_name: securevault-user
    ports:
      - "8002:8002"
    depends_on:
      - auth-service
    environment:
      - DB_PATH=/app/data/user.db
      - FRONTEND_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - user_db:/app/data
      - ./src/auth_service/public.pem:/auth_service/public.pem:ro
    restart: unless-stopped

  transaction-service:
    build:
      context: .
      dockerfile: docker/transaction/Dockerfile
    container_name: securevault-transaction
    ports:
      - "8003:8003"
    depends_on:
      - auth-service
    environment:
      - DB_PATH=/app/data/transaction.db
      - FRONTEND_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - transaction_db:/app/data
      - ./src/auth_service/public.pem:/auth_service/public.pem:ro
    restart: unless-stopped

volumes:
  auth_db:
  user_db:
  transaction_db:
