name: SecureVault-Husna-Pipeline

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # STAGE 1: SECRET DETECTION
  stage1-secret-scan:
    name: 'Stage 1 - Secret Detection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  # STAGE 2: SAST ANALYSIS
  stage2-sast-analysis:
    name: 'Stage 2 - SAST Analysis'
    runs-on: ubuntu-latest
    needs: stage1-secret-scan
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  # STAGE 3: CONTAINER SCAN
  stage3-container-scan:
    name: 'Stage 3 - Container Build & Scan'
    runs-on: ubuntu-latest
    needs: stage2-sast-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -f ./docker/auth/Dockerfile -t securevault-auth:${{ github.sha }} .
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'securevault-auth:${{ github.sha }}'
          exit-code: '0'

  # STAGE 4: IAC SECURITY SCAN
  stage4-iac-scan:
    name: 'Stage 4 - IaC Security Scan'
    runs-on: ubuntu-latest
    needs: stage3-container-scan
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes

  # STAGE 5: DAST SCAN
  stage5-dast-scan:
    name: 'Stage 5 - DAST Scan'
    runs-on: ubuntu-latest
    needs: [stage4-iac-scan, stage6-deploy] # DAST tab chale ga jab Deploy ho jaye ga
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for API
        run: sleep 30
      - name: Run OWASP ZAP
        continue-on-error: true
        run: |
          docker run -t ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -t http://api-gateway:8080/openapi.json \
            -f openapi

  # STAGE 6: KUBERNETES DEPLOYMENT
  stage6-deploy:
    name: 'Stage 6 - Deploy to Kubernetes'
    runs-on: ubuntu-latest
    needs: stage4-iac-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Kind Cluster
        uses: helm/kind-action@v1.10.0
      - name: Deploy App
        run: |
          kubectl apply -R -f k8s/
