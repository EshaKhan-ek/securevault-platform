name: SecureVault-Husna-Pipeline

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # STAGE 1: SECRET DETECTION
  # ==========================================
  stage1-secret-scan:
    name: 'Stage 1 - Secret Detection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  # ==========================================
  # STAGE 2: SAST ANALYSIS
  # ==========================================
  stage2-sast-analysis:
    name: 'Stage 2 - SAST Analysis'
    runs-on: ubuntu-latest
    needs: stage1-secret-scan
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  # ==========================================
  # STAGE 3: CONTAINER SCAN (Building Auth Service)
  # ==========================================
  stage3-container-scan:
    name: 'Stage 3 - Container Build & Scan'
    runs-on: ubuntu-latest
    needs: stage2-sast-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Build Auth Docker Image
        run: docker build -f ./docker/auth/Dockerfile -t securevault-auth:${{ github.sha }} .
      
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'securevault-auth:${{ github.sha }}'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '0'
          
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.json

  # ==========================================
  # STAGE 4: IAC SECURITY SCAN
  # ==========================================
  stage4-iac-scan:
    name: 'Stage 4 - IaC Security Scan'
    runs-on: ubuntu-latest
    needs: stage3-container-scan
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: . 
          framework: kubernetes

  # ==========================================
  # STAGE 5: KUBERNETES DEPLOYMENT & MONITORING
  # ==========================================
  stage5-deploy:
    name: 'Stage 5 - Deploy & Setup Monitoring'
    runs-on: ubuntu-latest
    needs: stage4-iac-scan
    steps:
      - uses: actions/checkout@v4
      - name: Setup Kind Cluster
        uses: helm/kind-action@v1.10.0
        
      # 🔥 NAYA STEP: Grafana aur Prometheus ko Khud Deploy Karega 🔥
      - name: Install Prometheus & Grafana (Official Stack)
        run: |
          echo "Downloading and Installing Prometheus & Grafana..."
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install kube-mon prometheus-community/kube-prometheus-stack --namespace monitoring --create-namespace
          echo "Waiting 30 seconds for Monitoring servers to boot up..."
          sleep 30
          
      - name: Apply Custom K8s Manifests
        run: |
          if [ -d "k8s" ]; then
            echo "Applying your custom k8s folder configurations..."
            kubectl apply -R -f k8s/
            sleep 20
          else
            echo "k8s folder not found, skipping custom manifests."
          fi
          
      - name: 📊 View Live Cluster Status
        run: |
          echo "======================================"
          echo " 📊 GRAFANA & PROMETHEUS SPECIFIC CHECK"
          echo "======================================"
          # Yeh sirf monitoring walay pods dikhayega jo Helm ne banaye hain
          kubectl get pods -n monitoring
          
          echo ""
          echo "======================================"
          echo "      ALL OTHER KUBERNETES PODS       "
          echo "======================================"
          kubectl get pods -A

  # ==========================================
  # STAGE 6: DAST SCAN (Using Docker Compose!)
  # ==========================================
  stage6-dast-scan:
    name: 'Stage 6 - DAST Scan (Live App)'
    runs-on: ubuntu-latest
    needs: stage5-deploy 
    steps:
      - uses: actions/checkout@v4
      
      - name: Start SecureVault via Docker Compose
        run: |
          docker-compose up -d --build
          echo "Waiting 30 seconds for all microservices to start..."
          sleep 30
          docker ps
          
      - name: Run OWASP ZAP on Auth Service
        continue-on-error: true
        run: |
          chmod 777 ${{ github.workspace }}
          docker run --network host -v ${{ github.workspace }}:/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -t http://localhost:8001/openapi.json \
            -f openapi \
            -r zap-report.html
            
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap-report.html
