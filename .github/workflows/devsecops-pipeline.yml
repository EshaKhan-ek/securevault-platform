name: SecureVault DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    needs: secret-detection
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [python, c-cpp]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: sast-codeql
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/auth/Dockerfile -t securevault-auth:${{ github.sha }} .
      - run: docker build -f docker/user/Dockerfile -t securevault-user:${{ github.sha }} .
      - run: docker build -f docker/transaction/Dockerfile -t securevault-transaction:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-auth:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-user:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-transaction:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker-compose down && docker-compose build --no-cache && docker-compose up -d
      - run: sleep 5 && curl -f http://localhost:8001/health && curl -f http://localhost:8002/health && curl -f http://localhost:8003/health
