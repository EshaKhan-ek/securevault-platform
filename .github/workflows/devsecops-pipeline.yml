name: SecureVault DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sast-codeql:
    name: SAST - CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, c-cpp]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: sast-codeql
    steps:
      - uses: actions/checkout@v4
      - name: Build auth image
        run: docker build -f docker/auth/Dockerfile -t securevault-auth:${{ github.sha }} .
      - name: Build user image
        run: docker build -f docker/user/Dockerfile -t securevault-user:${{ github.sha }} .
      - name: Build transaction image
        run: docker build -f docker/transaction/Dockerfile -t securevault-transaction:${{ github.sha }} .
      - name: Trivy scan - auth
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-auth:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: 0
      - name: Trivy scan - user
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-user:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: 0
      - name: Trivy scan - transaction
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securevault-transaction:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: 0
