apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: check-privileged
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Privileged containers are disallowed for banking infrastructure security compliance."
      pattern:
        spec:
          =(containers):
          - =(securityContext):
              =(privileged): "false"
